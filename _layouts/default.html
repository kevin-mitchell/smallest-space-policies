<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: "Smallest Space Policies" }}</title>

    <link rel="icon" type="image/png" href="https://smallest.space/assets/favicon/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="https://smallest.space/assets/favicon/favicon.svg">
    <link rel="shortcut icon" href="https://smallest.space/assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="https://smallest.space/assets/favicon/apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&amp;family=Rock+3D&amp;family=Rubik:ital,wght@0,300..900;1,300..900&amp;display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://smallest.space/assets/styles.css">
    
    <style>
        :root {
            --bg-light: #fffbea;
            --bg-light-near: #fffbea;
            --text-light: #000;
            --bg-dark: #333;
            --bg-dark-near: #4e4e4e;
            --text-dark: #f1f1f1;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: var(--bg-dark);
                --text-color: var(--text-dark);
            }
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: var(--bg-light);
                --text-color: var(--text-light);
            }
        }

        html,
        body {
            display: flex;
            justify-content: center;
            align-items: start;
            min-height: 100vh;
            margin: 0;
            width: 100%;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: 16px;
            font-family: "Rubik", serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            justify-content: start;
            max-width: 1200px;
            padding: 0 40px;
            background-color: color-mix(in srgb, var(--bg-color) 90%, white 4%);
            margin: 0 auto;
            box-sizing: border-box;
            width: 100%;
        }

        a {
            color: #0066cc;
        }
        
        @media (prefers-color-scheme: dark) {
            a {
                color: #66b2ff;
            }
        }

        a.stealth-link {
            text-decoration: none;
            color: inherit;
        }

        h1,
        h2,
        h3,
        h4,
        h5 {
            font-family: "Roboto Mono", serif;
            font-optical-sizing: auto;
            font-weight: 400;
            font-style: normal;
        }

        h2.logo,
        h1.logo {
            font-family: "Rock 3D", serif;
            font-weight: 400;
            font-style: normal;
            color: var(--text-color);
            display: flex;
            margin: 0;
        }

        h1.logo {
            display: none;
            font-size: 4rem;
            align-items: center;
            justify-content: center;
            gap: 15px;
            line-height: 3.75rem;
        }

        h1.logo picture {
            margin-top: 1.5rem;
            width: 70px;
        }

        h2.logo {
            font-size: 2.1rem;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        h2.logo picture {
            margin-top: 1.1rem;
            width: 30px;
        }

        @media (max-width: 768px) {
            h2.logo {
                font-size: 2.0rem;
                gap: 8px;
            }

            h2.logo picture {
                margin-top: 1.1rem;
                width: 25px;
            }

            h1.logo {
                font-size: 2.5rem;
                align-items: center;
                justify-content: center;
                gap: 15px;
                line-height: 2.75rem;
            }

            h1.logo picture {
                margin-top: 1.5rem;
                width: 50px;
            }
        }

        main {
            font-size: 1rem;
            line-height: 1.5;
            padding-bottom: 4rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <a class="stealth-link" href="https://smallest.space">
                <h2 class="logo">
                    <span>smallest</span>
                    <picture>
                        <source srcset="https://smallest.space/assets/smallest-space-logo-black.png" alt="smallest.space logo" media="(prefers-color-scheme: light)">
                        <source srcset="https://smallest.space/assets/smallest-space-logo-white.png" alt="smallest.space logo" media="(prefers-color-scheme: dark)">
                        <img src="https://smallest.space/assets/smallest-space-logo-white.png" alt="smallest.space logo">
                    </picture>
                    <span>space</span>
                </h2>
            </a>
        </header>
        <main role="main">
            <div class="markdown-goes-here row">
                {{ content }}
            </div>
        </main>
    </div>
</body>
</html>
